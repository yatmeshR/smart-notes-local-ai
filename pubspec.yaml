name: document_ocr
description: A local-first smart notes app powered by Ollama (LLM) and Tesseract (OCR).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  file_picker: ^8.0.0
  path: ^1.9.0
  google_mlkit_text_recognition: ^0.13.0
  shared_preferences: ^2.2.3
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
